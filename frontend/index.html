<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Code Visualizer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 1.1rem; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .panel-title { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
        .editor-container { height: 400px; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .analyze-btn {
            width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 600;
            background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white;
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;
            margin-top: 16px;
        }
        .analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .results-section { margin-top: 24px; }
        .result-panel { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .result-title { font-size: 1.2rem; font-weight: 600; color: #38bdf8; margin-bottom: 12px; }
        .result-content { color: #cbd5e1; line-height: 1.7; white-space: pre-wrap; }
        .code-block { background: #0f172a; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; overflow-x: auto; white-space: pre; color: #a5b4fc; border: 1px solid #334155; }
        .execution-trace { display: flex; flex-direction: column; gap: 8px; }
        .trace-step { display: grid; grid-template-columns: 50px 1fr; gap: 12px; padding: 12px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        .trace-line { font-family: monospace; color: #38bdf8; font-weight: 600; }
        .trace-code { font-family: monospace; color: #94a3b8; font-size: 0.85rem; }
        .trace-variables { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .variable-tag { background: #1e3a5f; color: #7dd3fc; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-family: monospace; }
        .flow-diagram { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 16px; background: #0f172a; border-radius: 8px; border: 1px solid #334155; }
        .flow-node { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; padding: 10px 20px; border-radius: 20px; font-weight: 500; font-size: 0.9rem; }
        .flow-arrow { color: #64748b; font-size: 1.2rem; }
        .error-display { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; padding: 16px; border-radius: 8px; margin-top: 12px; }
        .error-title { font-weight: 600; color: #f87171; margin-bottom: 8px; }
        .output-display { background: #0f172a; padding: 12px; border-radius: 8px; font-family: monospace; color: #4ade80; border: 1px solid #22c55e; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .key-points { display: flex; flex-wrap: wrap; gap: 8px; }
        .key-point { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .tab { padding: 8px 16px; background: transparent; border: none; color: #94a3b8; cursor: pointer; border-radius: 6px; font-size: 0.9rem; transition: all 0.2s; }
        .tab.active { background: #334155; color: #38bdf8; }
        .tab:hover { color: #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [code, setCode] = useState(`# Try your Python code here!
# Example: Calculate factorial

def factorial(n):
    if n <= 1:
        return 1
    return n * factorial(n - 1)

result = factorial(5)
print(f"Factorial of 5 is: {result}")`);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('explanation');
            const editorRef = useRef(null);

            useEffect(() => {
                require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
                require(['vs/editor/editor.main'], function () {
                    if (!editorRef.current) {
                        editorRef.current = monaco.editor.create(document.getElementById('editor'), {
                            value: code,
                            language: 'python',
                            theme: 'vs-dark',
                            minimap: { enabled: false },
                            fontSize: 14,
                            lineNumbers: 'on',
                            scrollBeyondLastLine: false,
                            automaticLayout: true,
                            tabSize: 4,
                            wordWrap: 'on',
                            padding: { top: 16 }
                        });
                        editorRef.current.onDidChangeModelContent(() => {
                            setCode(editorRef.current.getValue());
                        });
                    }
                });
            }, []);

const analyzeCode = async () => {
                setLoading(true);
                setError(null);
                setResult(null);
                try {
                    const apiUrl = window.location.origin + '/api/v1/analyze';
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    if (!response.ok) throw new Error('Analysis failed');
                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    const msg = err.name === 'TypeError' && err.message.includes('Failed to fetch') 
                        ? 'Cannot connect to server. Please refresh and try again.'
                        : err.message;
                    setError(msg);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <header className="header">
                        <h1>Python Code Visualizer</h1>
                        <p>Paste your Python code and see how it executes step-by-step</p>
                    </header>
                    <div className="main-grid">
                        <div className="panel">
                            <div className="panel-header">
                                <span className="panel-title">Python Code</span>
                            </div>
                            <div className="editor-container" id="editor"></div>
                            <button className="analyze-btn" onClick={analyzeCode} disabled={loading}>
                                {loading ? 'Analyzing...' : 'Analyze & Visualize'}
                            </button>
                        </div>
                        <div className="panel">
                            <div className="panel-header">
                                <span className="panel-title">Results</span>
                            </div>
                            {!result && !error && !loading && <div className="loading"><p>Click "Analyze" to see your code's execution flow</p></div>}
                            {loading && <div className="loading"><div className="loading-spinner"></div><p>Executing and analyzing your code...</p></div>}
                            {error && <div className="error-display"><div className="error-title">Error</div><p>{error}</p></div>}
                            {result && (
                                <div className="results-section">
                                    <div className="tabs">
                                        <button className={`tab ${activeTab === 'explanation' ? 'active' : ''}`} onClick={() => setActiveTab('explanation')}>Explanation</button>
                                        <button className={`tab ${activeTab === 'trace' ? 'active' : ''}`} onClick={() => setActiveTab('trace')}>Execution Trace</button>
                                        <button className={`tab ${activeTab === 'flow' ? 'active' : ''}`} onClick={() => setActiveTab('flow')}>Flow</button>
                                        <button className={`tab ${activeTab === 'improved' ? 'active' : ''}`} onClick={() => setActiveTab('improved')}>Improved</button>
                                    </div>
                                    {activeTab === 'explanation' && (
                                        <div className="result-panel">
                                            <div className="result-title">Explanation</div>
                                            <div className="result-content">{result.explanation}</div>
                                        </div>
                                    )}
                                    {activeTab === 'trace' && (
                                        <div className="result-panel">
                                            <div className="result-title">Step-by-Step Execution</div>
                                            {result.output && result.output.length > 0 && (
                                                <div style={{ marginBottom: 16 }}>
                                                    <div style={{ marginBottom: 8, color: '#94a3b8', fontSize: '0.9rem' }}>Output:</div>
                                                    <div className="output-display">{result.output.join('\n')}</div>
                                                </div>
                                            )}
                                            {result.error && <div className="error-display"><div className="error-title">Error</div><p>{result.error}</p></div>}
                                            <div className="execution-trace">
                                                {result.execution.map((step, i) => (
                                                    <div key={i} className="trace-step">
                                                        <div className="trace-line">L{step.line_number}</div>
                                                        <div>
                                                            <div className="trace-code">{step.code}</div>
                                                            {step.variables && Object.keys(step.variables).length > 0 && (
                                                                <div className="trace-variables">
                                                                    {Object.entries(step.variables).filter(([k]) => !k.startsWith('_') && !['__name__', '__package__'].includes(k)).map(([key, value]) => (
                                                                        <span key={key} className="variable-tag">{key} = {JSON.stringify(value)}</span>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'flow' && (
                                        <div className="result-panel">
                                            <div className="result-title">Execution Flow</div>
                                            {result.flow && result.flow.length > 0 && (
                                                <div style={{ marginBottom: 20 }}>
                                                    <div style={{ marginBottom: 12, color: '#94a3b8', fontSize: '0.9rem' }}>Flow:</div>
                                                    <div className="flow-diagram">
                                                        {result.flow.map((item, i) => (
                                                            <React.Fragment key={i}>
                                                                <div className="flow-node">{item}</div>
                                                                {i < result.flow.length - 1 && <span className="flow-arrow">→</span>}
                                                            </React.Fragment>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            {result.key_points && result.key_points.length > 0 && (
                                                <div>
                                                    <div style={{ marginBottom: 12, color: '#94a3b8', fontSize: '0.9rem' }}>Key Learning Points:</div>
                                                    <div className="key-points">
                                                        {result.key_points.map((point, i) => (<span key={i} className="key-point">{point}</span>))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                    {activeTab === 'improved' && (
                                        <div className="result-panel">
                                            <div className="result-title">Improved Code</div>
                                            <pre className="code-block">{result.fixed_code}</pre>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
